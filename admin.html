<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoScrip Admin — সম্পূর্ণ অনলাইন</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',sans-serif; }
    body { background:#0a0a0f; color:#fff; }
    .login-box { max-width:400px; margin:100px auto; background:#12121a; padding:40px; border-radius:16px; }
    input, button { width:100%; padding:12px; margin:10px 0; border-radius:8px; }
    button { background:#ff2d78; color:#fff; border:none; cursor:pointer; }
    #app { display:none; }
    .sidebar { width:250px; background:#12121a; position:fixed; height:100vh; padding:20px; }
    .main { margin-left:250px; padding:20px; }
    .btn { background:#ff2d78; color:#fff; padding:8px 16px; border:none; border-radius:6px; cursor:pointer; }
  </style>
</head>
<body>
<div id="loginScreen" class="login-box">
  <h2>⚡ AutoScrip Admin</h2>
  <input type="email" id="loginEmail" placeholder="ইমেইল" value="mrbanglagggaming@gmail.com">
  <input type="password" id="loginPwd" placeholder="পাসওয়ার্ড">
  <button onclick="doLogin()" id="loginBtn">লগইন</button>
  <div id="loginErr" style="color:red; display:none;"></div>
</div>

<div id="app">
  <div class="sidebar">
    <h3>👑 ADMIN</h3>
    <button onclick="showP('dashboard')">📊 ড্যাশবোর্ড</button>
    <button onclick="showP('tools'); loadTools()">🛠️ টুলস</button>
    <button onclick="showP('add-tool'); rstTool()">➕ নতুন টুল</button>
    <button onclick="showP('users'); loadUsers()">👥 ইউজার</button>
    <button onclick="showP('requests'); loadReqs()">🔔 রিকোয়েস্ট</button>
    <button onclick="logout()">🚪 লগআউট</button>
  </div>
  <div class="main" id="mainContent">
    <div id="pnl-dashboard" class="panel active">
      <h2>ড্যাশবোর্ড</h2>
      <div id="stats">লোড হচ্ছে...</div>
    </div>
    <div id="pnl-tools" class="panel">
      <h2>টুলস <span id="toolCount"></span></h2>
      <input type="text" id="toolSearch" placeholder="সার্চ..." onkeyup="filterTools()">
      <div id="toolsList"></div>
    </div>
    <div id="pnl-add-tool" class="panel">
      <h2 id="toolFormTitle">নতুন টুল</h2>
      <input type="text" id="toolTitle" placeholder="শিরোনাম">
      <textarea id="toolDesc" placeholder="বিবরণ"></textarea>
      <select id="toolCat">
        <option value="system">⚙️ সিস্টেম</option>
        <option value="network">🌐 নেটওয়ার্ক</option>
        <option value="security">🔒 সিকিউরিটি</option>
        <option value="backup">💾 ব্যাকআপ</option>
        <option value="monitoring">📊 মনিটরিং</option>
        <option value="automation">🤖 অটোমেশন</option>
      </select>
      <input type="text" id="toolAuthor" placeholder="লেখক" value="AutoScrip Team">
      <textarea id="toolCommands" placeholder="কমান্ড (প্রতি লাইনে একটি)"></textarea>
      <label><input type="checkbox" id="toolPublished" checked> প্রকাশিত</label>
      <label><input type="checkbox" id="toolFeatured"> ফিচার্ড</label>
      <button onclick="saveTool()" id="saveBtn">সেভ করুন</button>
    </div>
    <div id="pnl-users" class="panel"><h2>ইউজার</h2><div id="usersList"></div></div>
    <div id="pnl-requests" class="panel"><h2>রিকোয়েস্ট</h2><div id="requestsList"></div></div>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyA5_HYl2R1Sa17xBeBhyxO4lGa9lAY5ut4",
  authDomain: "powerscript-pro-web.firebaseapp.com",
  projectId: "powerscript-pro-web",
  storageBucket: "powerscript-pro-web.firebasestorage.app",
  messagingSenderId: "709315727810",
  appId: "1:709315727810:web:abeb73172635061343c65b"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

// state
let allTools = [], allUsers = [], allRequests = [], currentUser = null, editingId = null;

// login
window.doLogin = async () => {
  const email = document.getElementById('loginEmail').value;
  const pwd = document.getElementById('loginPwd').value;
  try {
    await auth.signInWithEmailAndPassword(email, pwd);
  } catch (e) {
    document.getElementById('loginErr').style.display = 'block';
    document.getElementById('loginErr').innerText = e.message;
  }
};

auth.onAuthStateChanged(async (user) => {
  if (user) {
    const adminDoc = await db.collection('autoscrip_admins').doc(user.uid).get();
    if (adminDoc.exists) {
      currentUser = { uid: user.uid, ...adminDoc.data() };
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      loadDashboard(); loadTools(); loadUsers(); loadReqs();
    } else {
      alert('আপনি অ্যাডমিন নন');
      auth.signOut();
    }
  }
});

window.logout = () => auth.signOut();

// UI
window.showP = (p) => {
  document.querySelectorAll('.panel').forEach(el => el.classList.remove('active'));
  document.getElementById('pnl-' + p).classList.add('active');
};

// dashboard
async function loadDashboard() {
  let tools = [], users = [], reqs = [];
  try { tools = await getTools(); } catch(e) {}
  try { users = await getUsers(); } catch(e) {}
  try { reqs = await getRequests(); } catch(e) {}
  
  document.getElementById('stats').innerHTML = `
    <p>📦 টুলস: ${tools.length}</p>
    <p>👥 ইউজার: ${users.length}</p>
    <p>🔔 পেন্ডিং: ${reqs.filter(r => r.status === 'pending').length}</p>
  `;
}

// tools
async function getTools() {
  const snap = await db.collection('autoscrip_tools').orderBy('createdAt','desc').get();
  return snap.docs.map(d => ({ _id: d.id, ...d.data() }));
}
window.loadTools = async () => {
  allTools = await getTools();
  document.getElementById('toolCount').innerText = allTools.length;
  renderTools();
};
function renderTools() {
  const q = (document.getElementById('toolSearch')?.value || '').toLowerCase();
  const filtered = q ? allTools.filter(t => t.title?.toLowerCase().includes(q)) : allTools;
  document.getElementById('toolsList').innerHTML = filtered.map(t => `
    <div style="border:1px solid #333; margin:10px 0; padding:10px; border-radius:8px;">
      <h4>${t.title} <small>${t.author}</small></h4>
      <p>${t.description?.substring(0,100)}...</p>
      <button onclick="editTool('${t._id}')">এডিট</button>
      <button onclick="deleteTool('${t._id}')">ডিলিট</button>
    </div>
  `).join('');
}
window.filterTools = loadTools;

window.rstTool = () => {
  editingId = null;
  document.getElementById('toolFormTitle').innerText = 'নতুন টুল';
  document.getElementById('toolTitle').value = '';
  document.getElementById('toolDesc').value = '';
  document.getElementById('toolCat').value = 'system';
  document.getElementById('toolAuthor').value = 'AutoScrip Team';
  document.getElementById('toolCommands').value = '';
  document.getElementById('toolPublished').checked = true;
  document.getElementById('toolFeatured').checked = false;
};

window.editTool = async (id) => {
  const tool = allTools.find(t => t._id === id);
  if (!tool) return;
  editingId = id;
  document.getElementById('toolFormTitle').innerText = 'এডিট টুল';
  document.getElementById('toolTitle').value = tool.title || '';
  document.getElementById('toolDesc').value = tool.description || '';
  document.getElementById('toolCat').value = tool.category || 'system';
  document.getElementById('toolAuthor').value = tool.author || 'AutoScrip Team';
  document.getElementById('toolCommands').value = Array.isArray(tool.commands) ? tool.commands.join('\n') : (tool.commands || '');
  document.getElementById('toolPublished').checked = tool.published !== false;
  document.getElementById('toolFeatured').checked = !!tool.featured;
  showP('add-tool');
};

window.saveTool = async () => {
  const data = {
    title: document.getElementById('toolTitle').value,
    description: document.getElementById('toolDesc').value,
    category: document.getElementById('toolCat').value,
    author: document.getElementById('toolAuthor').value,
    commands: document.getElementById('toolCommands').value.split('\n').filter(l => l.trim()),
    published: document.getElementById('toolPublished').checked,
    featured: document.getElementById('toolFeatured').checked,
    updatedAt: new Date().toISOString()
  };
  if (!data.title || !data.description || !data.commands.length) {
    alert('শিরোনাম, বিবরণ ও কমান্ড দিন');
    return;
  }
  try {
    if (editingId) {
      await db.collection('autoscrip_tools').doc(editingId).update(data);
    } else {
      data.createdAt = new Date().toISOString();
      data.views = 0; data.downloads = 0; data.likes = [];
      await db.collection('autoscrip_tools').add(data);
    }
    alert('✅ সেভ হয়েছে!');
    loadTools();
    showP('tools');
  } catch (e) {
    alert('এরর: ' + e.message);
  }
};

window.deleteTool = async (id) => {
  if (confirm('ডিলিট করবেন?')) {
    await db.collection('autoscrip_tools').doc(id).delete();
    loadTools();
  }
};

// users
async function getUsers() {
  const snap = await db.collection('autoscrip_users').orderBy('createdAt','desc').get();
  return snap.docs.map(d => ({ _id: d.id, ...d.data() }));
}
window.loadUsers = async () => {
  allUsers = await getUsers();
  document.getElementById('usersList').innerHTML = allUsers.map(u => `
    <div style="border:1px solid #333; padding:10px; margin:5px;">
      ${u.name || '—'} | ${u.email} | 
      <span style="color:${u.banned ? 'red' : 'green'}">${u.banned ? 'ব্যান' : 'সক্রিয়'}</span>
      <button onclick="toggleUserBan('${u._id}', ${!u.banned})">টগল</button>
    </div>
  `).join('');
};
window.toggleUserBan = async (id, banned) => {
  await db.collection('autoscrip_users').doc(id).update({ banned });
  loadUsers();
};

// requests
async function getRequests() {
  const snap = await db.collection('autoscrip_requests').orderBy('createdAt','desc').get();
  return snap.docs.map(d => ({ _id: d.id, ...d.data() }));
}
window.loadReqs = async () => {
  allRequests = await getRequests();
  document.getElementById('requestsList').innerHTML = allRequests.map(r => `
    <div style="border:1px solid #333; padding:10px; margin:5px;">
      <b>${r.type || 'রিকোয়েস্ট'}</b>: ${r.title || r.name} — 
      <span style="color:${{pending:'orange',approved:'green',rejected:'red'}[r.status]}">${r.status}</span>
      ${r.status === 'pending' ? `
        <button onclick="updateReq('${r._id}','approved')">✅ অ্যাপ্রুভ</button>
        <button onclick="updateReq('${r._id}','rejected')">❌ রিজেক্ট</button>
      ` : ''}
    </div>
  `).join('');
};
window.updateReq = async (id, status) => {
  await db.collection('autoscrip_requests').doc(id).update({ status });
  loadReqs();
};
</script>
</body>
</html>
